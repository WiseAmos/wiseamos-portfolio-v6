<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4F1EA"/>
      <stop offset="100%" stop-color="#E8E2D5"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1B1A17" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Eyebrow -->
  <g transform="translate(80, 100)">
    <line x1="0" y1="14" x2="40" y2="14" stroke="#B6553B" stroke-width="2"/>
    <text x="56" y="20" font-family="JetBrains Mono, monospace" font-size="14" font-weight="500" letter-spacing="3" fill="#1B1A17">ENGINEER · SINGAPORE · 2026</text>
  </g>

  <!-- Headline -->
  <g transform="translate(80, 180)">
    <text font-family="Georgia, serif" font-size="120" font-weight="400" fill="#1B1A17">
      <tspan x="0" y="120">Things that work</tspan>
      <tspan x="0" y="260" font-style="italic" fill="#B6553B">at 2 a.m.</tspan>
    </text>
  </g>

  <!-- Right column -->
  <g transform="translate(880, 180)">
    <text font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" letter-spacing="2" fill="#1B1A17" opacity="0.7">
      <tspan x="0" y="0">72 REPOS · 680 STARS</tspan>
    </text>
    <text font-family="Georgia, serif" font-size="20" font-style="italic" fill="#1B1A17" opacity="0.8">
      <tspan x="0" y="60">autonomous systems,</tspan>
      <tspan x="0" y="86">low-latency trading,</tspan>
      <tspan x="0" y="112">computer vision.</tspan>
    </text>
    <line x1="0" y1="140" x2="60" y2="140" stroke="#1B1A17" stroke-width="1" opacity="0.3"/>
    <text font-family="JetBrains Mono, monospace" font-size="12" font-weight="500" letter-spacing="2" fill="#1B1A17" opacity="0.5">
      <tspan x="0" y="180">wiseamos-portfolio-v6</tspan>
      <tspan x="0" y="200">.vercel.app</tspan>
    </text>
  </g>

  <!-- Footer line -->
  <line x1="80" y1="570" x2="1120" y2="570" stroke="#1B1A17" stroke-width="1" opacity="0.2"/>
  <text x="80" y="600" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2" fill="#1B1A17" opacity="0.6">© 2026 · AMOS GOH · 01.348°N / 103.819°E</text>
  <text x="1120" y="600" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="2" fill="#1B1A17" opacity="0.6">v6 →</text>
</svg>